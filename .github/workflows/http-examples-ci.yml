name: CI - HTTP Examples

on:
  push:
    branches: [ main, master ]
    paths:
      - 'examples.manifest.json'
      - 'LLM_SURFACE.md'
      - 'README.md'
      - 'EXAMPLE_STATUS.md'
      - 'http/**'
      - 'payloads/**'
      - 'smoke/**'
      - 'package.json'
      - '.github/workflows/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'examples.manifest.json'
      - 'LLM_SURFACE.md'
      - 'README.md'
      - 'EXAMPLE_STATUS.md'
      - 'http/**'
      - 'payloads/**'
      - 'smoke/**'
      - 'package.json'
      - '.github/workflows/**'
  workflow_dispatch:

concurrency:
  group: http-examples-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  catalog-integrity:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: praxisui-http-examples
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'

      - name: Verify manifest and generated surface
        run: npm run verify:manifest

  llm-surface-smoke:
    runs-on: ubuntu-latest
    needs: catalog-integrity
    permissions:
      contents: read
    defaults:
      run:
        working-directory: praxisui-http-examples
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20.x'

      - name: Smoke the LLM operational surface
        run: npm run smoke:llm-surface
